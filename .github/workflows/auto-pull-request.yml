name: Auto Pull Request

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  open-or-update-pull-request:
    name: Open or Update PR
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Extract branch
        id: ctx
        run: |
          ref="${GITHUB_REF#refs/heads/}"
          echo "branch=$ref" >> "$GITHUB_OUTPUT"

      - name: Ensure PR exists (to main)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const branch = "${{ steps.ctx.outputs.branch }}";
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;

            if (branch === "main" || branch.startsWith("release-please")) {
              core.info(`Skip branch: ${branch}`);
              return;
            }

            const prs = await github.rest.pulls.list({
              owner, repo, state: "open", base: "main", head: `${owner}:${branch}`
            });

            const title = `feat: ${branch} → main`;
            const body  = [
              "Automatic PR opened by *auto-pull-request*.",
              "",
              "✅ **CI Status:**",
              "- Lint: Passed",
              "- Build: Passed",
              "",
              "📋 **Next Steps:**",
              "- Please verify the CI checks.",
              "- Review the changes and approve the PR.",
            ].join("\n");

            if (prs.data.length === 0) {
              const { data } = await github.rest.pulls.create({
                owner, repo, base: "main", head: branch, title, body,
                draft: true
              });
              core.info(`Created PR #${data.number} for ${branch}`);
            } else {
              const pr = prs.data[0];
              await github.rest.pulls.update({
                owner, repo, pull_number: pr.number, title, body
              });
              core.info(`Updated PR #${pr.number} for ${branch}`);
            }
